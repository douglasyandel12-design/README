<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVS² Shop | Admin</title>
    <link rel="icon" href="img/Logo.jpg" type="image/jpeg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">LVS² Admin</a>
            <a href="index.html" style="text-decoration: none; color: var(--text-dark);">Ir a la Tienda</a>
        </nav>
    </header>

    <main class="container">
        <h1>Panel de Control</h1>
        <br>
        <div class="card" style="margin-bottom: 2rem;">
            <h2>Resumen de Ventas</h2>
            <canvas id="salesChart"></canvas>
        </div>
        <div class="admin-panel">
            <!-- Lista de Productos -->
            <div class="card">
                <h2>Inventario Actual</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Nombre</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                        <!-- JS render -->
                    </tbody>
                </table>
            </div>

            <!-- Sección de Pedidos -->
            <div class="card orders-section">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; margin-bottom: 1rem;">
                    <h2>Pedidos Recibidos</h2>
                    <button class="btn" style="width: auto; padding: 0.5rem 1rem;" onclick="exportOrdersToCSV()">Exportar (CSV)</button>
                </div>
                <div id="orders-list" style="margin-top: 1rem;"></div>
            </div>
        </div>
    </main>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Producto</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form onsubmit="saveProductModal(event)">
                <input type="hidden" id="edit-id">
                <div class="form-columns">
                    <!-- Columna Izquierda -->
                    <div class="form-column">
                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" id="edit-name" required>
                        </div>
                        <div class="form-group">
                            <label>Descripción</label>
                            <div id="edit-editor-container" style="height: 150px; background: white;"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Precio</label>
                                <input type="number" id="edit-price" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>Descuento (%)</label>
                                <input type="number" id="edit-discount" min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label>Stock</label>
                                <input type="number" id="edit-stock" placeholder="Vacío = ∞">
                            </div>
                        </div>
                    </div>
                    <!-- Columna Derecha -->
                    <div class="form-column">
                        <div class="image-manager">
                            <h4>📸 Galería de Imágenes</h4>
                            <div class="img-input-group">
                                <input type="text" id="img-url-edit" placeholder="Pegar URL de imagen..." style="margin-bottom:0;">
                                <button type="button" class="btn" onclick="addImageFromUrl('edit')" style="width:auto; padding: 5px 10px;">+</button>
                            </div>
                            <div style="margin-bottom:10px; text-align:center; font-size:0.8rem; color:#666;">O</div>
                            <label for="img-file-edit" class="custom-file-upload">Seleccionar imágenes</label>
                            <input type="file" id="img-file-edit" accept="image/*" multiple onchange="addImageFromFile('edit')">
                            <div id="img-preview-edit" class="img-preview-list"></div>
                        </div>
                        <!-- Contenedor para múltiples videos -->
                        <div id="video-manager-ui" class="image-manager" style="margin-top: 1rem; border-color: #e5e7eb;"></div>

                        <div id="edit-promo-container" style="margin-top: 1rem; padding: 0.5rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px;">
                            <label style="display:flex; align-items:center; gap:10px; cursor:pointer; color: #166534; font-weight: 500;"><input type="checkbox" id="edit-is-promo"><span>🌟 Activar promoción "Más compras, más barato"</span></label><small style="display:block; margin-top:4px; color:#166534;">Si activas esto, este producto bajará de precio según la cantidad (2 items = $2 menos, etc).</small>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" style="background: #ccc; color: #333;" onclick="closeEditModal()">Cancelar</button>
                    <button type="submit" class="btn">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
