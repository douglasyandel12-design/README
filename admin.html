<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVS² Shop | Admin</title>
    <link rel="icon" href="img/Logo.png" type="image/jpeg">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">LVS² Admin</a>
            <a href="index.html" class="nav-link">Ir a la Tienda</a>
        </nav>
    </header>

    <main class="container">
        <h1>Panel de Control</h1>
        <br>
        <div class="card card-spaced">
            <h2>Resumen de Ventas</h2>
            <canvas id="salesChart"></canvas>
        </div>
        <div class="admin-panel">
            <!-- Lista de Productos -->
            <div class="card">
                <h2>Inventario Actual</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Nombre</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                        <!-- JS render -->
                    </tbody>
                </table>
            </div>

            <!-- Sección de Pedidos -->
            <div class="card orders-section">
                <div class="section-header">
                    <h2>Pedidos Recibidos</h2>
                    <button class="btn btn-outline" onclick="exportOrdersToCSV()">Exportar (CSV)</button>
                </div>
                <div id="orders-list" class="mt-4"></div>
            </div>
        </div>
    </main>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Producto</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form onsubmit="saveProductModal(event)">
                <input type="hidden" id="edit-id">
                <div class="form-columns">
                    <!-- Columna Izquierda -->
                    <div class="form-column">
                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" id="edit-name" required>
                        </div>
                        <div class="form-group">
                            <label>Descripción</label>
                            <div id="edit-editor-container" class="editor-box"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Precio</label>
                                <input type="number" id="edit-price" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>Descuento (%)</label>
                                <input type="number" id="edit-discount" min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label>Stock</label>
                                <input type="number" id="edit-stock" placeholder="Vacío = ∞">
                            </div>
                        </div>
                    </div>
                    <!-- Columna Derecha -->
                    <div class="form-column">
                        <div class="image-manager">
                            <h4>📸 Galería de Imágenes</h4>
                            <div class="img-input-group">
                                <input type="text" id="img-url-edit" placeholder="Pegar URL de imagen...">
                                <button type="button" class="btn btn-outline" onclick="addImageFromUrl('edit')">+</button>
                            </div>
                            <div class="text-divider">O</div>
                            <label for="img-file-edit" class="custom-file-upload">Seleccionar imágenes</label>
                            <input type="file" id="img-file-edit" accept="image/*" multiple onchange="addImageFromFile('edit')">
                            <div id="img-preview-edit" class="img-preview-list"></div>
                        </div>
                        <!-- Contenedor para múltiples videos -->
                        <div id="video-manager-ui" class="image-manager mt-4"></div>

                        <div id="edit-promo-container" class="info-panel mt-4">
                            <label class="promo-toggle"><input type="checkbox" id="edit-is-promo"><span>🌟 Activar promoción "Más compras, más barato"</span></label>
                            <small class="promo-hint">Si activas esto, este producto bajará de precio según la cantidad (2 items = $2 menos, etc).</small>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancelar</button>
                    <button type="submit" class="btn">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
