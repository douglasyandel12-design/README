<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVS² Shop | Acceso</title>
    <link rel="icon" href="img/Logo.png" type="image/jpeg">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo">LVS² Shop</a>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
            <div class="tab" onclick="switchTab('register')">Crear Cuenta</div>
        </div>

        <!-- Formulario de Login (para admin y futuros usuarios locales) -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="login-pass" required>
            </div>
            <p class="error" id="login-error">Credenciales incorrectas.</p>
            <button type="submit" class="btn">Entrar</button>
            <p class="text-divider">o</p>
            <a href="/api/auth/google" class="btn google-btn btn-block">
                <span class="google-mark">G</span> Continuar con Google
            </a>
        </form>

        <!-- Opciones para crear cuenta -->
        <div id="register-form" class="hidden">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-pass" required>
                </div>
                <button type="submit" class="btn">Crear Cuenta</button>
            </form>
            <p class="text-divider">o</p>
            <a href="/api/auth/google" class="btn google-btn btn-block">
                <span class="google-mark">G</span> Continuar con Google
            </a>
        </div>

        <!-- Nuevo formulario de Verificación (Oculto por defecto) -->
        <div id="verify-form" class="hidden">
            <h3 class="text-center">Verificar Correo</h3>
            <p class="text-center small-text mb-4">
                Hemos enviado un código de 6 dígitos a <strong id="verify-email-display"></strong>.
            </p>
            <form onsubmit="handleVerification(event)">
                <div class="form-group">
                    <label>Código de Verificación</label>
                    <input type="text" id="verify-code" class="code-input" placeholder="Ej: 123456" required maxlength="6">
                </div>
                <button type="submit" class="btn">Verificar y Entrar</button>
                <button type="button" class="btn btn-outline" onclick="location.reload()">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
