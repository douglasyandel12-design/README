<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVS² Shop | Finalizar Pedido</title>
    <link rel="icon" href="img/Logo.png" type="image/jpeg">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/pedido.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">LVS² Shop</a>
            <a href="index.html" class="btn btn-outline">← Volver a la Tienda</a>
        </nav>
    </header>

    <main class="container">
        <h1>Finalizar Compra</h1>
        
        <form onsubmit="submitOrder(event)">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="client-name" required placeholder="Ej: Juan Pérez">
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="client-email" required placeholder="juan@ejemplo.com">
            </div>
            <div class="form-group checkbox-row">
                <input type="checkbox" id="remember-email">
                <label for="remember-email">Recordar mi correo en este dispositivo para futuras promociones.</label>
            </div>
            <div class="form-group">
                <label>Número de Teléfono</label>
                <input type="tel" id="client-phone" required placeholder="Ej: 55 1234 5678">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>País</label>
                    <select id="client-country" required><option value="">Cargando países...</option></select>
                </div>
                <div class="form-group">
                    <label>Provincia/Departamento</label>
                    <select id="client-state" required><option value="">Detectando...</option></select>
                </div>
            </div>
            <div class="form-group">
                <label>Ciudad/Municipio</label>
                <input type="text" id="client-city" required placeholder="Tu ciudad">
            </div>
            <div class="form-group">
                <label>Calle y Número (Dirección)</label>
                <input type="text" id="client-street" required placeholder="Calle, Número, Colonia...">
            </div>
            <div class="form-group">
                <label>Método de Pago</label>
                <select id="client-payment">
                    <option>Tarjeta de Crédito / Débito</option>
                    <option>PayPal</option>
                    <option>Transferencia Bancaria</option>
                </select>
            </div>
            <button type="submit" class="btn">Confirmar Pedido</button>
        </form>

        <div class="order-summary">
            <h3>Resumen del Pedido</h3>
            <div id="items-list" class="panel-block"></div>
            <div class="total-row">
                <span>Total a Pagar:</span>
                <span id="order-total">$0.00</span>
            </div>
        </div>
    </main>

    <script src="js/pedido.js"></script>
</body>
</html>
